<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Plan Editor</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="./editor.css?v=1.0.0" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>Study Plan Editor</h1>
      <p>請輸入編輯密碼</p>
      <input id="passwordInput" type="password" placeholder="輸入密碼" />
      <button id="loginBtn" class="primary-btn">進入 editor</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>

  <div id="appShell" class="app-shell editor" style="display:none;">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">編</div>
        <div>
          <h1>讀書計畫編輯後台</h1>
          <p>Study Plan Editor / Supabase</p>
        </div>
      </div>

      <div class="toolbar">
        <a
          id="viewerLink"
          href="./"
          class="ghost-link"
        >
          返回主視圖
        </a>
      </div>
    </header>

    <main class="layout-editor">
      <section class="panel selector-panel">
        <div class="panel-head">
          <div>
            <h2>選擇要編輯的格子</h2>
            <p>月模式用月份卡片；週 / 日模式用月曆</p>
          </div>
        </div>

        <section class="selector-form">
          <div class="field">
            <label>檢視模式</label>
            <div class="view-switch" role="tablist">
              <button type="button" class="view-btn active" data-view="month">月</button>
              <button type="button" class="view-btn" data-view="week">週</button>
              <button type="button" class="view-btn" data-view="day">日</button>
            </div>
          </div>

          <div id="monthPickerSection" class="picker-section">
            <div class="field">
              <label>選擇月份</label>
              <div id="monthCardGrid" class="month-card-grid"></div>
            </div>
          </div>

          <div id="calendarSection" class="picker-section" style="display:none;">
            <div class="field">
              <label>選擇日期</label>

              <div class="calendar-shell">
                <div class="calendar-header">
                  <button type="button" class="calendar-nav" id="prevMonthBtn">‹</button>
                  <div class="calendar-title" id="calendarTitle">2026年5月</div>
                  <button type="button" class="calendar-nav" id="nextMonthBtn">›</button>
                </div>

                <div class="calendar-weekdays">
                  <span>日</span>
                  <span>一</span>
                  <span>二</span>
                  <span>三</span>
                  <span>四</span>
                  <span>五</span>
                  <span>六</span>
                </div>

                <div id="calendarGrid" class="calendar-grid"></div>
              </div>

              <p class="hint" id="dateHint">點一天即可選擇；週模式會自動轉成該週。</p>
            </div>
          </div>

          <div class="field">
            <label for="subjectSelect">科目</label>
            <select id="subjectSelect">
              <option value="chinese">國文</option>
              <option value="mathA">數學A</option>
              <option value="science">自然（物理 / 化學 / 生物 / 地科）</option>
              <option value="english">英文</option>
              <option value="social">社會（歷史 / 地理 / 公民）</option>
              <option value="other">其他</option>
            </select>
          </div>

          <div class="selected-summary" id="selectedSummary">尚未選擇時間</div>

          <button type="button" class="primary-btn" id="loadCellBtn">讀取這一格</button>

          <section class="subject-note-card compact">
            <h3>欄位格式說明（自動生成）</h3>
            <ul>
              <li>月：YYYY/MM</li>
              <li>週：YYYY/MM Wn</li>
              <li>日：YYYY/MM/DD</li>
            </ul>
          </section>
        </section>
      </section>

      <section class="panel editor-panel">
        <div class="panel-head">
          <div>
            <h2>編輯計畫內容</h2>
            <p id="currentCellLabel">尚未選擇格子</p>
          </div>
          <span id="saveStatus" class="chip">尚未儲存</span>
        </div>

        <form id="editForm" class="editor-form">
          <div class="field-row">
            <div class="field">
              <label for="titleInput">主題標題</label>
              <input type="text" id="titleInput" placeholder="例如：數列與排列總整理" />
            </div>
            <div class="field">
              <label for="levelInput">強度</label>
              <select id="levelInput">
                <option value="1">普通</option>
                <option value="2">重點</option>
                <option value="3">衝刺</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="noteInput">內容備註</label>
            <textarea
              id="noteInput"
              rows="6"
              placeholder="具體寫今天 / 本週 / 本月要完成的內容，之後在 viewer 就會看到"
            ></textarea>
          </div>

          <div class="field">
            <label for="progressInput">完成度</label>
            <div class="range-row">
              <input type="range" id="progressInput" min="0" max="100" value="0" />
              <span id="progressLabel">0%</span>
            </div>
          </div>

       <div class="editor-actions">
  <button type="submit" class="primary-btn">儲存（新增或更新）</button>
  <button type="button" class="ghost-btn" id="deleteBtn">刪除這一格</button>
  <button type="button" class="ghost-btn" id="duplicateNextBtn">複製到下一期</button>
  <button type="button" class="ghost-btn" id="duplicateTargetBtn">複製到指定期</button>
</div>
        </form>

       <section class="subject-note-card compact">
  <h3>目前狀態</h3>
  <div id="debugBox" class="status-box">
    <div class="status-line">尚未載入</div>
  </div>
</section>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./editor.js?v=1.0.0"></script>
</body>
</html>
