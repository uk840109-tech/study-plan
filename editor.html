<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Study Plan Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Editor 樣式 -->
  <link rel="stylesheet" href="editor.css" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>Study Plan Editor</h1>
      <p>請輸入編輯密碼</p>
      <input id="passwordInput" type="password" placeholder="輸入密碼" />
      <button id="loginBtn" class="primary-btn">進入 editor</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>

  <div id="appShell" class="app-shell" style="display:none;">
    <header class="topbar">
      <div>
        <h1>Study Plan Editor</h1>
        <p>讀書計畫編輯器</p>
      </div>
      <div class="topbar-badge">Editor</div>
    </header>

    <section class="editor-toolbar">
      <div class="control-group">
        <label for="viewSelect">檢視模式</label>
        <select id="viewSelect">
          <option value="day">日</option>
          <option value="week">週</option>
          <option value="month">月</option>
        </select>
      </div>

      <div class="control-group">
        <label for="timeSelect">時間</label>
        <select id="timeSelect"></select>
      </div>

      <div class="control-group">
        <label for="subjectSelect">科目</label>
        <select id="subjectSelect">
          <option value="chinese">國文</option>
          <option value="english">英文</option>
          <option value="math">數學</option>
          <option value="science">自然</option>
          <option value="society">社會</option>
          <option value="other">其他</option>
        </select>
      </div>
    </section>

    <section class="action-row">
      <button id="saveBtn" class="primary-btn">儲存</button>
      <button id="deleteBtn" class="danger-btn">刪除單格</button>
      <button id="duplicateBtn">複製到下一期</button>
      <button id="templateBtn">建立模板</button>
      <button id="clearPeriodBtn">清空這期</button>
    </section>

    <section class="editor-panel">
      <h3 id="editorTitle">載入中...</h3>
      <textarea
        id="contentInput"
        placeholder="輸入這一格的讀書計畫內容，例如：國文課文整理、英文單字 30 個、自然重點複習、社會筆記整理、其他自主學習"
      ></textarea>
    </section>

    <section class="grid-panel">
      <div class="panel-title">
        <h2>格子快速選取</h2>
        <p>點一下切換編輯目標</p>
      </div>
      <div id="planGrid"></div>
    </section>
  </div>

  <!-- Editor JS -->
  <script src="editor.js"></script>
</body>
</html>
